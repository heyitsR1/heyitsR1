<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 300" width="760" height="300">
  <defs>
    <style>text { font-family: 'JetBrains Mono','Fira Code','Cascadia Code','Menlo',monospace; }</style>

    <clipPath id="c1">
      <rect x="20" y="24" width="0" height="22">
        <animate attributeName="width" from="0" to="740" begin="1.0s" dur="0.8s" fill="freeze"/>
      </rect>
    </clipPath>
    <clipPath id="c2">
      <rect x="20" y="62" width="0" height="22">
        <animate attributeName="width" from="0" to="740" begin="3.0s" dur="3.2s" fill="freeze"/>
      </rect>
    </clipPath>
    <clipPath id="c3">
      <rect x="20" y="100" width="0" height="22">
        <animate attributeName="width" from="0" to="740" begin="7.8s" dur="2.6s" fill="freeze"/>
      </rect>
    </clipPath>
    <clipPath id="c4">
      <rect x="20" y="138" width="0" height="22">
        <animate attributeName="width" from="0" to="740" begin="12.0s" dur="2.8s" fill="freeze"/>
      </rect>
    </clipPath>
    <clipPath id="c5">
      <rect x="20" y="176" width="0" height="22">
        <animate attributeName="width" from="0" to="740" begin="16.4s" dur="2.2s" fill="freeze"/>
      </rect>
    </clipPath>
    <clipPath id="c6">
      <rect x="20" y="214" width="0" height="22">
        <animate attributeName="width" from="0" to="740" begin="20.2s" dur="1.4s" fill="freeze"/>
      </rect>
    </clipPath>
  </defs>

  <!-- background -->
  <rect width="760" height="300" rx="10" fill="#0d1117"/>

  <!-- LINE 1: ϕ -->
  <text x="20" y="42" font-size="14" fill="#e6edf3" clip-path="url(#c1)" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="1.0s" dur="0.01s" fill="freeze"/>
    ϕ
  </text>
  <rect x="20" y="27" width="6" height="14" rx="1" fill="#e6edf3" opacity="0">
    <animate attributeName="opacity" from="0" to="0.5" begin="1.0s" dur="0.01s" fill="freeze"/>
    <animate attributeName="x" from="20" to="30" begin="1.0s" dur="0.8s" fill="freeze"/>
    <animate attributeName="opacity" from="0.5" to="0" begin="1.8s" dur="0.3s" fill="freeze"/>
  </rect>

  <!-- LINE 2 -->
  <text x="20" y="80" font-size="14" fill="#e6edf3" clip-path="url(#c2)" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="3.0s" dur="0.01s" fill="freeze"/>
    <tspan fill="#484f58">&gt; </tspan>r1 here _ i exist at the intersection of my machine and the universe
  </text>
  <rect x="20" y="65" width="6" height="14" rx="1" fill="#e6edf3" opacity="0">
    <animate attributeName="opacity" from="0" to="0.5" begin="3.0s" dur="0.01s" fill="freeze"/>
    <animate attributeName="x" from="20" to="590" begin="3.0s" dur="3.2s" fill="freeze"/>
    <animate attributeName="opacity" from="0.5" to="0" begin="6.2s" dur="0.3s" fill="freeze"/>
  </rect>

  <!-- LINE 3 -->
  <text x="20" y="118" font-size="14" fill="#e6edf3" clip-path="url(#c3)" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="7.8s" dur="0.01s" fill="freeze"/>
    <tspan fill="#484f58">&gt;&gt; </tspan>currently: building, breaking, banking on forever
  </text>
  <rect x="20" y="103" width="6" height="14" rx="1" fill="#e6edf3" opacity="0">
    <animate attributeName="opacity" from="0" to="0.5" begin="7.8s" dur="0.01s" fill="freeze"/>
    <animate attributeName="x" from="20" to="430" begin="7.8s" dur="2.6s" fill="freeze"/>
    <animate attributeName="opacity" from="0.5" to="0" begin="10.4s" dur="0.3s" fill="freeze"/>
  </rect>

  <!-- LINE 4 -->
  <text x="20" y="156" font-size="14" fill="#e6edf3" clip-path="url(#c4)" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="12.0s" dur="0.01s" fill="freeze"/>
    <tspan fill="#484f58">&gt;&gt;&gt; </tspan>sometimes it's too noisy to know yourself;
  </text>
  <rect x="20" y="141" width="6" height="14" rx="1" fill="#e6edf3" opacity="0">
    <animate attributeName="opacity" from="0" to="0.5" begin="12.0s" dur="0.01s" fill="freeze"/>
    <animate attributeName="x" from="20" to="400" begin="12.0s" dur="2.8s" fill="freeze"/>
    <animate attributeName="opacity" from="0.5" to="0" begin="14.8s" dur="0.3s" fill="freeze"/>
  </rect>

  <!-- LINE 5 -->
  <text x="20" y="194" font-size="14" fill="#e6edf3" clip-path="url(#c5)" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="16.4s" dur="0.01s" fill="freeze"/>
    <tspan fill="#484f58">&gt;&gt;&gt;&gt; </tspan>take it slow, you'll be alright ;))
  </text>
  <rect x="20" y="179" width="6" height="14" rx="1" fill="#e6edf3" opacity="0">
    <animate attributeName="opacity" from="0" to="0.5" begin="16.4s" dur="0.01s" fill="freeze"/>
    <animate attributeName="x" from="20" to="348" begin="16.4s" dur="2.2s" fill="freeze"/>
    <animate attributeName="opacity" from="0.5" to="0" begin="18.6s" dur="0.3s" fill="freeze"/>
  </rect>

  <!-- LINE 6 -->
  <text x="20" y="232" font-size="14" fill="#e6edf3" clip-path="url(#c6)" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="20.2s" dur="0.01s" fill="freeze"/>
    <tspan fill="#484f58">&gt;&gt;&gt;&gt;&gt; </tspan>driven by the almighty:
  </text>
  <rect x="20" y="217" width="6" height="14" rx="1" fill="#e6edf3" opacity="0">
    <animate attributeName="opacity" from="0" to="0.5" begin="20.2s" dur="0.01s" fill="freeze"/>
    <animate attributeName="x" from="20" to="252" begin="20.2s" dur="1.4s" fill="freeze"/>
    <animate attributeName="opacity" from="0.5" to="0" begin="21.6s" dur="0.3s" fill="freeze"/>
  </rect>

  <!-- LINE 7: cosmos — slow fade -->
  <text x="20" y="270" font-size="14" fill="#e6edf3" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="23.0s" dur="2.5s" fill="freeze"/>
    <tspan fill="#484f58">&gt;&gt;&gt;&gt;&gt;&gt; </tspan>cosmos
  </text>

  <!-- blinking cursor after cosmos -->
  <rect x="138" y="255" width="6" height="14" rx="1" fill="#e6edf3" opacity="0">
    <animate attributeName="opacity" from="0" to="0.4" begin="25.5s" dur="0.01s" fill="freeze"/>
    <animate attributeName="opacity" values="0.4;0;0.4" dur="1.8s" begin="25.5s" repeatCount="indefinite"/>
  </rect>

</svg>
