  </text>

  <!-- CURSOR -->
  <rect x="76" y="255" width="8" height="15" rx="1" fill="#7e9ab5" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="9.9s" dur="0.01s" fill="freeze"/>
    <animate attributeName="x" from="76" to="128" begin="9.9s" dur="1.0s" fill="freeze"/>
    <animate attributeName="opacity" values="1;0;1;0;1;0;1" dur="2.1s" begin="11.2s" repeatCount="indefinite"/>
  </rect>

</svg>
